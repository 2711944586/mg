    <path d="M385 95 C505 25 615 5 750 55 L750 390 C630 334 520 350 385 420 Z" fill="#f6e7cf"/>
    <path d="M385 95 L385 420" stroke="#b88a35" stroke-width="4"/>
    <path d="M80 145 L315 108 M80 205 L315 170 M80 265 L315 235" stroke="#9b2022" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <path d="M455 135 L690 98 M455 196 L690 165 M455 260 L645 230" stroke="#5d1214" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  </g>
  <g fill="#fff8ec" font-family="Microsoft YaHei, Arial, sans-serif" text-anchor="middle">
    <text x="640" y="92" font-size="46" font-weight="700">让理论之光照亮青春之路</text>
    <text x="640" y="640" font-size="28">在经典中坚定方向，在实践中增长本领</text>
  </g>
