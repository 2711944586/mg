<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">主题短片封面</title>
  <desc id="desc">书页、时间轴、城市、乡村和青年学习场景组成的课堂展示画面。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4d1617"/>
      <stop offset="55%" stop-color="#7a171a"/>
      <stop offset="100%" stop-color="#3d2a1f"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1">
      <stop offset="0%" stop-color="#fff7e8"/>
      <stop offset="100%" stop-color="#ead6b7"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 520 C240 430 356 600 560 510 C740 430 890 455 1280 320 L1280 720 L0 720 Z" fill="#496b55" opacity="0.56"/>
  <path d="M110 600 C300 500 425 610 610 540 C810 465 990 505 1210 390" fill="none" stroke="#d9b15d" stroke-width="6" opacity="0.5"/>
  <g transform="translate(245 160)">
